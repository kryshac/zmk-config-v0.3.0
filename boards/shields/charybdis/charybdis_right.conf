CONFIG_INPUT=y
CONFIG_ZMK_USB=n
CONFIG_SPI=y
CONFIG_PMW3610_ALT=y
# Give nice_nano_v2 external VCC time to come up before the PMW3610 init probe.
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# After overnight standby the PMW3610 can be in REST3, whose default 500 ms
# sample period feels like reduced DPI until the firmware fully wakes it.
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=10
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=10
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=10
