CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_IDLE_TIMEOUT=20000
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=48
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=80
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4

CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-1

CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
# Keep EXT_POWER dedicated to peripherals such as the PMW3610. ZMK defaults this
# to y for RGB, but RGB idle/off would otherwise shut down the trackball rail.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=110
